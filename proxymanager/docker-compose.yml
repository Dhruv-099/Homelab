services:
  app:
    image: 'jc21/nginx-proxy-manager:latest'
    restart: unless-stopped
    environment:
      TZ: "Asia/Kolkata"
    ports:
      - '80:80'
      - '81:81'
      - '443:443'
    volumes:
      # Persist Nginx Proxy Manager app data and configuration on the host
      - ./data:/data
      # Persist Let's Encrypt certificates and keys on the host
      - ./letsencrypt:/etc/letsencrypt
    networks:
      - homelab
networks:
 homelab:
  external: true
