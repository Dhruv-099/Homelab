services:
  filebrowser:
    image: filebrowser/filebrowser:latest
    container_name: filebrowser
    restart: unless-stopped
    user: "1001:1001"
    environment:
      TZ: Asia/Kolkata
    volumes:
      - /:/srv/root
      - ./filebrowser.db:/database/filebrowser.db
      - ./settings.json:/config/settings.json
    ports:
      - 8086:80
    networks:
      - homelab

networks:
  homelab:
    external: true