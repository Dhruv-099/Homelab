services:
  kavita:
    image: jvmilazz0/kavita:latest
    container_name: kavita
    restart: unless-stopped
    environment:
      TZ: Asia/Kolkata
    volumes:
      - ./config:/kavita/config
      - /path/to/books:/books
    ports:
      - 5001:5000
    networks:
      - homelab

networks:
  homelab:
    external: true