services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      TZ: Asia/Kolkata
    volumes:
      - ./data:/data
      - /mnt/elements-1tb/DriveD/My Songs:/music:ro
    ports:
      - 4533:4533
    networks:
      - homelab

networks:
  homelab:
    external: true
