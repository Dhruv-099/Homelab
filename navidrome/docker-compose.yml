services:
  navidrome:
    container_name: navidrome
    image: deluan/navidrome:latest
    restart: unless-stopped
    environment:
      ND_SCANSCHEDULE: 1h
      ND_LOGLEVEL: info
      ND_SESSIONTIMEOUT: 24h
      ND_BASEURL: ""
      TZ: Asia/Kolkata
    volumes:
      # Persist Navidrome database and runtime data on the host
      - ./data:/data
      # Mount readonly music library from host storage for playback
      # Use `${NAVIDROME_MUSIC_DIR}` in `.env` to avoid exposing host path.
      - ${NAVIDROME_MUSIC_DIR}:/music:ro
    ports:
      - 4533:4533
    networks:
      - homelab

networks:
  homelab:
    external: true
